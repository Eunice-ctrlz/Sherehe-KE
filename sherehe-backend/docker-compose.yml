version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine # Crucial: PostGIS image, standard Postgres fails
    container_name: sherehe-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123imthebest
      POSTGRES_DB: sherehe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c shared_preload_libraries=pg_stat_statements
               -c max_connections=200

  redis:
    image: redis:7-alpine
    container_name: sherehe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: sherehe-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql://postgres:123imthebest@postgres:5432/sherehe_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery_worker:
    build: .
    container_name: sherehe-worker
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:123imthebest@postgres:5432/sherehe_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery_beat:
    build: .
    container_name: sherehe-beat
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:123imthebest@postgres:5432/sherehe_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - celery_worker

volumes:
  postgres_data:
  redis_data: